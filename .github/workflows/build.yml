name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Decode keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/myalbum-release.jks

    - name: Build Signed Release APK
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: ./gradlew assembleRelease --stacktrace

    - name: Upload Signed Release APK
      uses: actions/upload-artifact@v4
      with:
        name: MyAlbum-release-signed
        path: app/build/outputs/apk/release/*.apk
        retention-days: 90

    - name: Create GitHub Release
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v5.0.0
        name: MyAlbum v5.0.0 - UI Overhaul
        body: |
          ## MyAlbum v5.0.0 - UI Overhaul

          ### UI Upgrade:
          - Complete UI redesign with clean Material You styling
          - True dark theme with proper surface container hierarchy
          - Premium color palette with better contrast
          - Grouped settings cards with rounded corners
          - Enhanced album cards with gradient overlays
          - Improved stats bar with icon layout
          - Cleaner filter chips and navigation
          - Better empty state views
          - Refined viewer controls and page indicator

          ### Changes:
          - Removed VenCA security module (photo app doesn't need DEX protection)
          - Re-enabled app backup functionality
          - Cleaned up ProGuard rules
          - Improved TopAppBar styling across all screens

          Created by MT Studio
        files: app/build/outputs/apk/release/*.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
