name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Decode keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/myalbum-release.jks

    - name: Build Signed Release APK
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: ./gradlew assembleRelease --stacktrace

    - name: Upload Signed Release APK
      uses: actions/upload-artifact@v4
      with:
        name: MyAlbum-release-signed
        path: app/build/outputs/apk/release/*.apk
        retention-days: 90

    - name: Create GitHub Release
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v5.1.0
        name: MyAlbum v5.1.0 - Items & Albums Upgrade
        body: |
          ## MyAlbum v5.1.0 - Items & Albums Upgrade

          ### Video Thumbnail Fix:
          - Videos now show proper thumbnails from MediaStore
          - Added thumbnailUri field with fallback loading
          - Error fallback for videos that fail to load thumbnail

          ### Media Item UI Upgrade:
          - Dynamic aspect ratio based on actual image/video dimensions
          - Video overlay: play icon in circle background, duration badge, file size
          - High-res image badge (width > 3000px) showing resolution
          - Large file size badge for photos > 5MB
          - Smaller grid gaps (2dp) for tighter, cleaner grid
          - Subtle 4dp rounded corners on grid items

          ### Album Card UI Upgrade:
          - Multi-thumbnail grid cover (2x2) for albums with 4+ items
          - Double-thumbnail cover for albums with 2-3 items
          - Video count indicator badge (red) on album cards
          - Album description shows "X muc (Y video)"
          - Refined card styling with better contrast

          ### New Features:
          - Sort dropdown in gallery (newest, oldest, name A-Z)
          - GalleryViewModel now supports sort order
          - Stats bar shows total storage size
          - Album/Favorites subtitle shows photo + video counts
          - MediaItem now includes orientation and gridAspectRatio

          ### Data Improvements:
          - AlbumInfo tracks videoCount per album
          - AlbumInfo stores recentUris for multi-thumb grid
          - MediaStoreHelper queries ORIENTATION column

          Created by MT Studio
        files: app/build/outputs/apk/release/*.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
