name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Cache Gradle packages
      uses: actions/cache@v4
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Decode keystore
      run: |
        echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/myalbum-release.jks

    - name: Build Signed Release APK
      env:
        KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: ./gradlew assembleRelease --stacktrace

    - name: Upload Signed Release APK
      uses: actions/upload-artifact@v4
      with:
        name: MyAlbum-release-signed
        path: app/build/outputs/apk/release/*.apk
        retention-days: 90

    - name: Create GitHub Release
      if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v5.1.1
        name: MyAlbum v5.1.1 - Crash Fix & Video Thumbnails
        body: |
          ## MyAlbum v5.1.1 - Crash Fix & Video Thumbnails

          ### Critical Crash Fix:
          - Fixed app crash on startup when loading media items
          - Root cause: Coil trying to decode video content URIs as images caused OOM
          - Removed recursive SubcomposeAsyncImage error handler that amplified the crash

          ### Video Thumbnail System:
          - Added VideoThumbnailUtil for proper video frame extraction
          - Uses ContentResolver.loadThumbnail (API 29+) and MediaMetadataRetriever (older)
          - Async thumbnail generation via produceState - no more main thread blocking
          - Thumbnails cached to disk for fast subsequent loading

          ### Performance Improvements:
          - Optimized grid index lookup: O(n) indexOf → O(1) HashMap lookup
          - Added try-catch around all MediaStore queries for crash safety
          - Individual item errors no longer crash the entire gallery

          ### Memory Management:
          - Added MyAlbumApp with custom Coil ImageLoader
          - 25% app memory for image cache, 5% disk for image cache
          - Controlled memory usage prevents OOM on large galleries

          ### ProGuard Improvements:
          - Added Accompanist permissions keep rules
          - Added MyAlbumApp keep rules
          - All critical classes properly preserved in release builds

          Created by MT Studio
        files: app/build/outputs/apk/release/*.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
